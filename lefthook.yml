skip_lfs: true
output:
  - success
  - failure
prepare-commit-msg:
  commands:
    aittributor:
      run: aittributor {1}
      skip:
        - run: "! which aittributor"
pre-commit:
  jobs:
    - name: fmt
      stage_fixed: true
      run: just fmt
pre-push:
  parallel: true
  jobs:
    - name: lint
      run: just lint

    - name: test
      run: just test
